name: Java Enterprise CI Pipeline

# Định nghĩa các sự kiện kích hoạt đường ống tự động
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job chịu trách nhiệm kiểm thử đa nền tảng và biên dịch mã nguồn
  matrix-build-and-test:
    name: Test & Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    # Chiến lược lập ma trận kiểm thử song song
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest] # Chạy trên cả 3 hệ điều hành lớn
      fail-fast: true # 🎯 Chuẩn chuyên nghiệp: Hủy toàn bộ các job khác ngay lập tức nếu có 1 job bị fail

    steps:
      # Bước 1: Kéo mã nguồn mới nhất từ nhánh về máy ảo CI
      - name: Checkout source code
        uses: actions/checkout@v4

      # Bước 2: Thiết lập môi trường Java JDK tiêu chuẩn doanh nghiệp
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin' # Sử dụng bản phân phối Eclipse Temurin hiệu năng cao, độ ổn định cực tốt
          cache: 'maven' # ⚡ KÍCH HOẠT CACHE TỐI ƯU: Tự động băm nhỏ (hash) file pom.xml để đóng băng/nạp nhanh thư viện phụ thuộc

      # Bước 3: Biên dịch hệ thống và thực thi toàn bộ kho chứa Unit Test (JUnit 5)
      - name: Execute Compile and Unit Tests
        run: mvn clean test

      # Bước 4: Kiểm tra khả năng đóng gói (Sinh ra file .jar hoàn chỉnh)
      - name: Verify Package Production Artifact
        run: mvn package -DskipTests # Đóng gói thử nghiệm, bỏ qua bước test vì bước trên đã test xong